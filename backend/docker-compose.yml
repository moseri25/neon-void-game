version: '3.8'

services:
  auth:
    build:
      context: .
      dockerfile: ../infra/docker/Dockerfile.backend
      args:
        SERVICE_NAME: auth
        PORT: 8081
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/neonvoid?sslmode=disable
      - JWT_SECRET=dev-secret-change-in-production

  ws:
    build:
      context: .
      dockerfile: ../infra/docker/Dockerfile.backend
      args:
        SERVICE_NAME: ws
        PORT: 8080
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=dev-secret-change-in-production

  game:
    build:
      context: .
      dockerfile: ../infra/docker/Dockerfile.backend
      args:
        SERVICE_NAME: game
        PORT: 8082
    ports:
      - "8082:8082"
    environment:
      - REDIS_URL=redis://host.docker.internal:6379
      - JWT_SECRET=dev-secret-change-in-production
