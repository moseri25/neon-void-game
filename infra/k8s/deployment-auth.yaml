apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: neon-void
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: neon-void
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-service-role
  namespace: neon-void
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-service-rolebinding
  namespace: neon-void
subjects:
  - kind: ServiceAccount
    name: auth-service-sa
    namespace: neon-void
roleRef:
  kind: Role
  name: auth-service-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: neon-void
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: neon-void
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: neon-void
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: auth-service-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: neon-void/auth-service:latest
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: neon-void-secrets
          env:
            - name: SERVICE_NAME
              value: "auth-service"
            - name: PORT
              value: "8081"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
