apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-service
  namespace: neon-void
  labels:
    app.kubernetes.io/name: ws-service
    app.kubernetes.io/part-of: neon-void
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ws-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ws-service
        app.kubernetes.io/part-of: neon-void
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ws-service
          image: neon-void/ws-service:latest
          ports:
            - name: ws
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          envFrom:
            - secretRef:
                name: neon-void-secrets
          env:
            - name: SERVICE_NAME
              value: "ws-service"
            - name: PORT
              value: "8080"
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
  # Session affinity is configured at the Service level
