<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Main leg glow grouping -->
  <g stroke="#00FFFF" stroke-width="2" fill="none" filter="url(#glow)">
    <!-- Legs (left) -->
    <path d="M45,50 Q20,30 10,40" />
    <path d="M45,52 Q20,45 15,60" />
    <path d="M45,54 Q25,60 20,75" />
    <path d="M45,56 Q35,70 30,85" />
    <!-- Legs (right) -->
    <path d="M55,50 Q80,30 90,40" />
    <path d="M55,52 Q80,45 85,60" />
    <path d="M55,54 Q75,60 80,75" />
    <path d="M55,56 Q65,70 70,85" />
  </g>
  <!-- Body Group -->
  <g fill="none" stroke="#FF0055" stroke-width="2" filter="url(#glow)">
    <circle cx="50" cy="50" r="10" />
    <circle cx="50" cy="40" r="6" />
  </g>
  <circle cx="50" cy="50" r="4" fill="#FF0055" />
  <!-- Eyes -->
  <circle cx="48" cy="38" r="1" fill="#00FFFF" />
  <circle cx="52" cy="38" r="1" fill="#00FFFF" />
</svg>
